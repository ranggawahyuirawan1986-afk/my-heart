<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  text-align:center;
  overflow:hidden;
}

/* layar awal */
#start {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:10;
}

button {
  padding:10px 20px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:white;
  cursor:pointer;
}

/* slideshow */
.slide {
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
}

.slide img {
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.5;
}

/* teks */
.text {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:80%;
  font-size:18px;
  line-height:1.6;
  white-space:pre-line;
}

/* animasi fade */
.fade {
  animation:fade 1.5s;
}
@keyframes fade {
  from {opacity:0.4}
  to {opacity:1}
}
</style>
</head>

<body>

<!-- layar pembuka -->
<div id="start">
  <h2>Aku ada sesuatu buat kamu ❤️</h2>
  <button onclick="mulai()">Buka</button>
</div>

<!-- slide 1 -->
<div class="slide fade">
  <img src="foto1.jpg">
  <div class="text" id="text1"></div>
</div>

<!-- slide 2 -->
<div class="slide fade">
  <img src="foto2.jpg">
  <div class="text" id="text2"></div>
</div>

<!-- slide 3 -->
<div class="slide fade">
  <img src="foto3.jpg">
  <div class="text" id="text3"></div>
</div>

<!-- musik -->
<audio id="lagu" loop>
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

<script>
let slideIndex = 0;

const texts = [
`Selamat ulang tahun ya, sayang...

Sejak kenal kamu,
hari ini jadi beda buat aku.`,

`Aku mungkin jarang bilang,
tapi kamu itu penting banget buat aku.

Lebih dari yang kamu kira.`,

`Aku sayang kamu...
dan aku bakal tetap di sini,
bareng kamu. ❤️`
];

function showSlides() {
  let slides = document.getElementsByClassName("slide");

  for (let i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";
  }

  slideIndex++;
  if (slideIndex > slides.length) { slideIndex = 1 }

  slides[slideIndex-1].style.display = "block";

  ketik(`text${slideIndex}`, texts[slideIndex-1]);

  setTimeout(showSlides, 6000);
}

function ketik(id, message) {
  let i = 0;
  let speed = 40;
  let el = document.getElementById(id);
  el.innerHTML = "";

  function type() {
    if (i < message.length) {
      el.innerHTML += message.charAt(i);
      i++;
      setTimeout(type, speed);
    }
  }
  type();
}

function mulai(){
  document.getElementById("start").style.display="none";
  document.getElementById("lagu").play();
  showSlides();
}
</script>

</body>
</html>
